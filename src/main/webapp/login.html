<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Racing Giulio Kart — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100vh;
    margin: 0; padding: 0; overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 50px;
    width: 90%;
    max-width: 460px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    color: #fff;
  }

  .card h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.6em;
    margin-bottom: 4px;
    letter-spacing: 3px;
  }

  .subtitle {
    opacity: 0.6;
    font-size: 0.85em;
    letter-spacing: 2px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .field { margin-bottom: 16px; text-align: left; }
  .field label {
    display: block;
    font-size: 0.78em;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    padding: 13px 18px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.35); }
  .field input:focus { border-color: #ffcc00; background: rgba(255,204,0,0.06); }

  /* Password toggle */
  .pwd-wrap { position: relative; }
  .pwd-wrap input { padding-right: 48px; }
  .pwd-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 1.1em;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pwd-toggle:hover { color: #ffcc00; }

  /* Link "dimentica password" sotto il campo password */
  .forgot-link {
    display: block;
    text-align: right;
    margin-top: 6px;
    padding-right: 6px;
    font-size: 0.76em;
    color: rgba(255,204,0,0.65);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: #ffcc00; }

  .btn-primary {
    margin-top: 8px;
    padding: 14px 40px;
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .separator {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .separator-line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
  .separator-text { font-size: 0.78em; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

  .btn-google {
    width: 100%;
    padding: 13px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    font-weight: 600;
    letter-spacing: 1px;
    border-radius: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .btn-google:hover { border-color: #ffcc00; background: rgba(255,204,0,0.06); transform: translateY(-2px); }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .errore { color: #ff6b6b; font-size: 0.88em; margin-top: 10px; min-height: 18px; }

  .footer-link { margin-top: 24px; font-size: 0.88em; color: rgba(255,255,255,0.5); }
  .footer-link a { color: #ffcc00; text-decoration: none; font-weight: 600; }
  .footer-link a:hover { opacity: 0.75; }
</style>
</head>
<body>
<div class="card">
  <h1>🏎️ RACING GIULIO KART</h1>
  <div class="subtitle">Accedi al tuo account</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="player@example.com" autocomplete="email"/>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pwd-wrap">
      <input type="password" id="password" placeholder="La tua password"
             autocomplete="current-password"/>
      <button type="button" class="pwd-toggle" onclick="togglePwd('password',this)" tabindex="-1" title="Mostra/nascondi password">
        <svg id="eye-password" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <!-- Link recupero password -->
    <a class="forgot-link" href="forgot-password.html">🔐 Hai dimenticato la password?</a>
  </div>

  <div class="errore" id="erroreMsg"></div>

  <button class="btn-primary" id="loginBtn" onclick="doLogin()">ENTRA NEL GIOCO ➜</button>

  <div class="separator">
    <div class="separator-line"></div>
    <div class="separator-text">oppure</div>
    <div class="separator-line"></div>
  </div>

  <button class="btn-google" onclick="doGoogleLogin()">
    <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continua con Google
  </button>

  <div class="footer-link">
    Nuovo giocatore? <a href="register.html">Registrati</a>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  const svg = btn.querySelector('svg');
  if (isHidden) {
    // occhio sbarrato
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    // occhio aperto
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errEl    = document.getElementById('erroreMsg');
  const btn      = document.getElementById('loginBtn');

  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Inserisci email e password.'; return; }

  btn.textContent = 'ACCESSO IN CORSO...';
  btn.disabled = true;

  try {
    const fd = new URLSearchParams();
    fd.append('email', email);
    fd.append('password', password);
    const res  = await fetch('Login', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.ok) {
      btn.textContent = '✓ ACCESSO EFFETTUATO';
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'GIOCO.html';
      setTimeout(() => { window.location.href = redirect; }, 800);
    } else {
      errEl.textContent = data.errore || 'Email o password errati.';
      btn.textContent = 'ENTRA NEL GIOCO ➜';
      btn.disabled = false;
    }
  } catch (e) {
    errEl.textContent = 'Errore di connessione al server.';
    btn.textContent = 'ENTRA NEL GIOCO ➜';
    btn.disabled = false;
  }
}

function doGoogleLogin() {
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || 'GIOCO.html';
  window.location.href = 'GoogleLogin?redirect=' + encodeURIComponent(redirect);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
