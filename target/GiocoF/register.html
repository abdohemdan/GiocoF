<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Racing Giulio Kart — Registrazione</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    padding: 24px 0;
  }

  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 50px;
    width: 90%;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    color: #fff;
  }

  .card h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.6em;
    margin-bottom: 4px;
    letter-spacing: 3px;
  }

  .subtitle {
    opacity: 0.6;
    font-size: 0.85em;
    letter-spacing: 2px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  /* ── Sezione separatore ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 22px 0 16px;
  }
  .section-divider .line { flex:1; height:1px; background:rgba(255,255,255,0.15); }
  .section-divider .label {
    font-family: 'Orbitron', monospace;
    font-size: 0.58em;
    letter-spacing: 2.5px;
    color: rgba(255,204,0,0.7);
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* ── Badge opzionale ── */
  .badge-opzionale {
    display: inline-block;
    background: rgba(255,204,0,0.1);
    border: 1px solid rgba(255,204,0,0.3);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.68em;
    letter-spacing: 1px;
    color: #ffcc00;
    margin-bottom: 10px;
    vertical-align: middle;
  }

  /* ── Box domande di sicurezza ── */
  .security-box {
    background: rgba(255,204,0,0.04);
    border: 1px solid rgba(255,204,0,0.18);
    border-radius: 14px;
    padding: 18px 16px 14px;
    margin-bottom: 4px;
    text-align: left;
  }
  .security-box .desc {
    font-size: 0.8em;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    line-height: 1.5;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .security-box .desc .ico { font-size: 1.1em; flex-shrink: 0; margin-top: 1px; }

  .field { margin-bottom: 16px; text-align: left; }
  .field label {
    display: block;
    font-size: 0.78em;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input, .field select {
    width: 100%;
    padding: 13px 18px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
  }
  .field select option { background: #1a2a3a; color: #fff; }
  .field input::placeholder { color: rgba(255,255,255,0.35); }
  .field input:focus, .field select:focus {
    border-color: #ffcc00;
    background: rgba(255,204,0,0.06);
  }

  /* hint una parola */
  .hint-parola {
    font-size: 0.68em;
    color: rgba(255,204,0,0.5);
    margin-top: 5px;
    padding: 0 6px;
  }

  /* Barra forza password */
  .strength-bar { display: flex; gap: 5px; margin-top: 8px; padding: 0 4px; }
  .strength-bar div { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); transition: background 0.3s; }
  .strength-label { font-size: 0.75em; color: rgba(255,255,255,0.4); margin-top: 4px; text-align: right; padding: 0 4px; letter-spacing: 1px; }

  .btn-primary {
    margin-top: 8px;
    padding: 14px 40px;
    background: linear-gradient(135deg, #ffcc00, #ff9900);
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .separator {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .separator-line { flex: 1; height: 1px; background: rgba(255,255,255,0.15); }
  .separator-text { font-size: 0.78em; color: rgba(255,255,255,0.4); letter-spacing: 2px; }

  .btn-google {
    width: 100%;
    padding: 13px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1em;
    font-weight: 600;
    letter-spacing: 1px;
    border-radius: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .btn-google:hover { border-color: #ffcc00; background: rgba(255,204,0,0.06); transform: translateY(-2px); }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .errore  { color: #ff6b6b; font-size: 0.88em; margin-top: 10px; min-height: 18px; }
  .successo { color: #00ff88; font-size: 0.88em; margin-top: 10px; min-height: 18px; }

  /* Password toggle */
  .pwd-wrap { position: relative; }
  .pwd-wrap input { padding-right: 48px !important; }
  .pwd-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 1.1em;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pwd-toggle:hover { color: #ffcc00; }

  .footer-link { margin-top: 24px; font-size: 0.88em; color: rgba(255,255,255,0.5); }
  .footer-link a { color: #ffcc00; text-decoration: none; font-weight: 600; }
  .footer-link a:hover { opacity: 0.75; }
</style>
</head>
<body>
<div class="card">
  <h1>🏎️ RACING GIULIO KART</h1>
  <div class="subtitle">Crea il tuo account</div>

  <!-- ── CAMPI BASE ── -->
  <div class="field">
    <label>Nickname</label>
    <input type="text" id="nak_name" placeholder="Il tuo nickname..." maxlength="50"/>
  </div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="player@example.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="pwd-wrap">
      <input type="password" id="password" placeholder="Min. 6 caratteri" oninput="checkStrength(this.value)"/>
      <button type="button" class="pwd-toggle" onclick="togglePwd('password',this)" tabindex="-1" title="Mostra/nascondi password">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="strength-bar">
      <div id="s1"></div><div id="s2"></div><div id="s3"></div><div id="s4"></div>
    </div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>
  <div class="field">
    <label>Conferma Password</label>
    <div class="pwd-wrap">
      <input type="password" id="password2" placeholder="Ripeti la password"/>
      <button type="button" class="pwd-toggle" onclick="togglePwd('password2',this)" tabindex="-1" title="Mostra/nascondi password">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <!-- ── DOMANDE DI SICUREZZA ── -->
  <div class="section-divider">
    <div class="line"></div>
    <div class="label">🛡 Domande di sicurezza</div>
    <div class="line"></div>
  </div>

  <div class="security-box">
    <div class="desc">
      <span class="ico">💡</span>
      <span>Imposta due domande di sicurezza per poter <strong style="color:rgba(255,204,0,0.9);">recuperare la password</strong> in futuro. Le risposte devono essere <strong style="color:rgba(255,204,0,0.9);">una sola parola</strong>.</span>
    </div>

    <!-- Domanda 1 -->
    <div class="field">
      <label>Prima domanda</label>
      <select id="domanda1">
        <option value="">— Scegli una domanda —</option>
        <option value="Come si chiama il tuo animale domestico?">Come si chiama il tuo animale domestico?</option>
        <option value="Qual è il nome della tua città natale?">Qual è il nome della tua città natale?</option>
        <option value="Come si chiama il tuo miglior amico d'infanzia?">Come si chiama il tuo miglior amico d'infanzia?</option>
        <option value="Qual è il tuo cibo preferito?">Qual è il tuo cibo preferito?</option>
        <option value="Come si chiama la tua scuola elementare?">Come si chiama la tua scuola elementare?</option>
        <option value="Qual è il colore della tua macchina preferita?">Qual è il colore della tua macchina preferita?</option>
        <option value="Come si chiama il tuo cantante preferito?">Come si chiama il tuo cantante preferito?</option>
        <option value="Qual è il nome del tuo film preferito?">Qual è il nome del tuo film preferito?</option>
      </select>
    </div>
    <div class="field">
      <label>Risposta (una parola)</label>
      <input type="text" id="risposta1" placeholder="Es: Fido" maxlength="40"
             autocomplete="off" oninput="rimuoviSpazi(this)"/>
      <div class="hint-parola">⚡ Una sola parola, senza spazi</div>
    </div>

    <!-- Domanda 2 -->
    <div class="field" style="margin-top:4px;">
      <label>Seconda domanda</label>
      <select id="domanda2">
        <option value="">— Scegli una domanda —</option>
        <option value="Come si chiama il tuo animale domestico?">Come si chiama il tuo animale domestico?</option>
        <option value="Qual è il nome della tua città natale?">Qual è il nome della tua città natale?</option>
        <option value="Come si chiama il tuo miglior amico d'infanzia?">Come si chiama il tuo miglior amico d'infanzia?</option>
        <option value="Qual è il tuo cibo preferito?">Qual è il tuo cibo preferito?</option>
        <option value="Come si chiama la tua scuola elementare?">Come si chiama la tua scuola elementare?</option>
        <option value="Qual è il colore della tua macchina preferita?">Qual è il colore della tua macchina preferita?</option>
        <option value="Come si chiama il tuo cantante preferito?">Come si chiama il tuo cantante preferito?</option>
        <option value="Qual è il nome del tuo film preferito?">Qual è il nome del tuo film preferito?</option>
      </select>
    </div>
    <div class="field">
      <label>Risposta (una parola)</label>
      <input type="text" id="risposta2" placeholder="Es: Roma" maxlength="40"
             autocomplete="off" oninput="rimuoviSpazi(this)"/>
      <div class="hint-parola">⚡ Una sola parola, senza spazi</div>
    </div>
  </div>

  <div class="errore"   id="erroreMsg"></div>
  <div class="successo" id="successoMsg"></div>

  <button class="btn-primary" id="regBtn" onclick="doRegister()">CREA ACCOUNT ➜</button>

  <div class="separator">
    <div class="separator-line"></div>
    <div class="separator-text">oppure</div>
    <div class="separator-line"></div>
  </div>

  <button class="btn-google" onclick="doGoogleLogin()">
    <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Registrati con Google
  </button>

  <div class="footer-link">
    Hai già un account? <a href="login.html">Accedi</a>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  const svg = btn.querySelector('svg');
  if (isHidden) {
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function rimuoviSpazi(input) {
  input.value = input.value.replace(/\s/g, '');
}

function checkStrength(val) {
  const bars  = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
  const label = document.getElementById('strengthLabel');
  const colors = ['#ff6b6b','#ff9900','#ffcc00','#00ff88'];
  const labels = ['DEBOLE','DISCRETA','BUONA','OTTIMA'];
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.15)'; });
  label.textContent  = val.length > 0 ? labels[score - 1] || '' : '';
  label.style.color  = score > 0 ? colors[score - 1] : 'rgba(255,255,255,0.4)';
}

async function doRegister() {
  const nakName   = document.getElementById('nak_name').value.trim();
  const email     = document.getElementById('email').value.trim();
  const password  = document.getElementById('password').value.trim();
  const pass2     = document.getElementById('password2').value.trim();
  const domanda1  = document.getElementById('domanda1').value;
  const risposta1 = document.getElementById('risposta1').value.trim();
  const domanda2  = document.getElementById('domanda2').value;
  const risposta2 = document.getElementById('risposta2').value.trim();
  const errEl     = document.getElementById('erroreMsg');
  const okEl      = document.getElementById('successoMsg');
  const btn       = document.getElementById('regBtn');

  errEl.textContent = '';
  okEl.textContent  = '';

  // ── Validazione base ────────────────────────────────────────────────────
  if (!nakName || !email || !password || !pass2) {
    errEl.textContent = 'Tutti i campi sono obbligatori.'; return;
  }
  if (password.length < 6) {
    errEl.textContent = 'La password deve essere di almeno 6 caratteri.'; return;
  }
  if (password !== pass2) {
    errEl.textContent = 'Le password non coincidono.'; return;
  }

  // ── Validazione domande di sicurezza ────────────────────────────────────
  const haDomanda1 = domanda1 && risposta1;
  const haDomanda2 = domanda2 && risposta2;

  // Se l'utente ha compilato parzialmente le domande, avvisa
  if ((haDomanda1 && !haDomanda2) || (!haDomanda1 && haDomanda2)) {
    errEl.textContent = 'Compila entrambe le domande di sicurezza (o lascia entrambe vuote).'; return;
  }

  if (haDomanda1 && haDomanda2) {
    if (risposta1.includes(' ')) {
      errEl.textContent = 'La risposta alla prima domanda deve essere una sola parola.'; return;
    }
    if (risposta2.includes(' ')) {
      errEl.textContent = 'La risposta alla seconda domanda deve essere una sola parola.'; return;
    }
    if (domanda1 === domanda2) {
      errEl.textContent = 'Scegli due domande diverse.'; return;
    }
  }

  btn.textContent = 'CREAZIONE IN CORSO...';
  btn.disabled = true;

  try {
    const fd = new URLSearchParams();
    fd.append('nak_name', nakName);
    fd.append('email',    email);
    fd.append('password', password);
    if (haDomanda1 && haDomanda2) {
      fd.append('domanda1',  domanda1);
      fd.append('risposta1', risposta1);
      fd.append('domanda2',  domanda2);
      fd.append('risposta2', risposta2);
    }

    const res  = await fetch('Register', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.ok) {
      okEl.textContent = '✓ Account creato! Reindirizzamento...';
      btn.textContent  = '✓ FATTO!';
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect') || 'GIOCO.html';
      setTimeout(() => { window.location.href = redirect; }, 1200);
    } else {
      errEl.textContent = data.errore || 'Errore durante la registrazione.';
      btn.textContent = 'CREA ACCOUNT ➜';
      btn.disabled = false;
    }
  } catch (e) {
    errEl.textContent = 'Errore di connessione al server.';
    btn.textContent = 'CREA ACCOUNT ➜';
    btn.disabled = false;
  }
}

function doGoogleLogin() {
  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect') || 'GIOCO.html';
  window.location.href = 'GoogleLogin?redirect=' + encodeURIComponent(redirect);
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
</script>
</body>
</html>
